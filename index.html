<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login</title>

<style>
body{
  margin:0;
  font-family:'Poppins',sans-serif;
  background:linear-gradient(180deg,#e3f2fd,#90caf9);
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
}

.card{
  background:#fff;
  padding:25px;
  border-radius:18px;
  box-shadow:0 6px 14px rgba(0,0,0,0.2);
  width:300px;
  text-align:center;
}

input{
  width:90%;
  padding:10px;
  margin:10px 0;
  border-radius:10px;
  border:1px solid #ccc;
}

button{
  width:100%;
  padding:10px;
  border:none;
  border-radius:10px;
  background:#1565c0;
  color:white;
  font-weight:bold;
}
</style>
</head>

<body>

<div class="card">
  <h2>🧊 Login Sistem</h2>

  <input type="text" id="user" placeholder="Username">
  <input type="password" id="pass" placeholder="Password">

  <button onclick="login()">Login</button>
</div>

<script>
function login(){
  let u = document.getElementById("user").value;
  let p = document.getElementById("pass").value;

  if(u=="user" && p=="123"){
    window.location="user.html";
  }else if(u=="teknisi" && p=="123"){
    window.location="teknisi.html";
  }else{
    alert("Login gagal!");
  }
}
</script>

</body>
</html>
