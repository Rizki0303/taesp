<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>User Monitoring</title>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>

<style>
body{
  margin:0;
  font-family:'Poppins',sans-serif;
  background:linear-gradient(180deg,#e3f2fd,#90caf9);
  color:#0d47a1;
}

/* HEADER */
.header{
  display:flex;
  align-items:center;
  background:#1565c0;
  color:white;
  padding:10px;
}

.menu-btn{
  font-size:22px;
  cursor:pointer;
  margin-right:10px;
}

.title{
  font-size:16px;
  font-weight:bold;
}

/* SIDEBAR */
.sidebar{
  position:fixed;
  top:0;
  left:-250px;
  width:200px;
  height:100%;
  background:white;
  box-shadow:2px 0 8px rgba(0,0,0,0.2);
  transition:0.3s;
  padding:20px;
}

.sidebar a{
  display:block;
  margin:15px 0;
  text-decoration:none;
  color:#1565c0;
  font-weight:bold;
}

/* CONTENT */
.container{
  padding:16px;
  max-width:420px;
  margin:auto;
}

.card{
  background:#fff;
  border-radius:18px;
  padding:14px;
  margin-bottom:12px;
  box-shadow:0 6px 14px rgba(0,0,0,0.15);
}

.card h3{
  margin:0;
  font-size:13px;
  color:#1565c0;
}

.value{
  margin-top:6px;
  font-size:24px;
  font-weight:bold;
}

.normal{color:#2e7d32;}
.warning{color:#f57c00;}
.danger{color:#c62828;}

.btn{
  width:100%;
  padding:10px;
  border:none;
  border-radius:12px;
  background:#1565c0;
  color:white;
  margin-top:10px;
  font-weight:bold;
}

.footer{
  margin-top:20px;
  text-align:center;
  font-size:12px;
  color:#555;
}
</style>
</head>

<body>

<!-- HEADER -->
<div class="header">
  <div class="menu-btn" onclick="toggleMenu()">☰</div>
  <div class="title">User Monitoring</div>
</div>

<!-- SIDEBAR -->
<div id="sidebar" class="sidebar">
  <a href="#" onclick="logout()">🚪 Logout</a>
</div>

<!-- CONTENT -->
<div class="container">

<div class="card">
  <h3>ID Refrigerator</h3>
  <div class="value">REFRI-01</div>
</div>

<div class="card">
  <h3>📅 Hari / Tanggal</h3>
  <div id="tanggal" class="value"></div>
</div>

<div class="card">
  <h3>⏰ Jam</h3>
  <div id="jam" class="value"></div>
</div>

<div class="card">
  <h3>🌡 Suhu</h3>
  <div id="suhu" class="value">--</div>
</div>

<div class="card">
  <h3>📊 Status Suhu</h3>
  <div id="status" class="value">--</div>
</div>

<button class="btn" onclick="downloadExcel()">⬇ Download Excel</button>

<div class="footer">
ESP32 • Firebase RTDB • Blood Refrigerator System
</div>

</div>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyCbDmGS4TS--Ky6yygTVuOuUQX4vkeuycY",
  databaseURL: "https://taesp-ce0a6-default-rtdb.asia-southeast1.firebasedatabase.app"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database();

const hariList = ["Minggu","Senin","Selasa","Rabu","Kamis","Jumat","Sabtu"];

/* MENU */
function toggleMenu(){
  let sidebar=document.getElementById("sidebar");
  sidebar.style.left = (sidebar.style.left==="0px") ? "-250px" : "0px";
}

function logout(){
  window.location="index.html";
}

/* WAKTU */
setInterval(()=>{
  let d=new Date();

  let hari=hariList[d.getDay()];
  let tgl=d.getDate().toString().padStart(2,'0')+"/"+
          (d.getMonth()+1).toString().padStart(2,'0')+"/"+
          d.getFullYear();

  let jam=d.getHours().toString().padStart(2,'0')+":"+
          d.getMinutes().toString().padStart(2,'0')+":"+
          d.getSeconds().toString().padStart(2,'0');

  document.getElementById("tanggal").innerHTML=hari+", "+tgl;
  document.getElementById("jam").innerHTML=jam;

},1000);

/* DATA */
db.ref("blood_refrigerator/data").on("value", snap=>{
  let d=snap.val();
  let suhu=d.suhu_refrigerator;

  document.getElementById("suhu").innerHTML=suhu+" °C";

  let statusEl=document.getElementById("status");

  if(suhu>=2 && suhu<=6){
    statusEl.innerHTML="Normal";
    statusEl.className="value normal";
  }else if(suhu>6){
    statusEl.innerHTML="Panas";
    statusEl.className="value danger";
  }else{
    statusEl.innerHTML="Dingin";
    statusEl.className="value warning";
  }
});

/* DOWNLOAD */
function downloadExcel(){
  db.ref("blood_refrigerator/log").once("value", snap=>{
    let csv="ID,Hari,Tanggal,Jam,Suhu\n";

    snap.forEach(y=>{
      y.forEach(m=>{
        m.forEach(d=>{
          d.forEach(h=>{
            let val=h.val();

            let hari = hariList[new Date(`${y.key}-${m.key}-${d.key}`).getDay()];
            let tanggal = `${d.key.padStart(2,'0')}/${m.key.padStart(2,'0')}/${y.key}`;
            let jam = `${h.key}:00`;

            csv+=`REFRI-01,${hari},${tanggal},${jam},${val.suhu_refrigerator}\n`;
          });
        });
      });
    });

    let blob=new Blob([csv],{type:'text/csv'});
    let a=document.createElement("a");
    a.href=URL.createObjectURL(blob);
    a.download="data_user.csv";
    a.click();
  });
}
</script>

</body>
</html>
